<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Poppins', sans-serif;
        overflow: hidden;

        /* 🔥 Animated Neon Background */
        background: linear-gradient(270deg, #00dbde, #fc00ff, #ff8c00, #00ff87);
        background-size: 800% 800%;
        animation: gradientMove 15s ease infinite;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Glass Card */
    .card {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        color: white;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        animation: float 4s ease-in-out infinite;
        z-index: 10;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff; }
        to { text-shadow: 0 0 25px #ff00ff, 0 0 40px #00ffff; }
    }

    p {
        opacity: 0.9;
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 30px;
        background: linear-gradient(45deg, #ff00ff, #00ffff);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px #fff;
    }

    /* Floating circles */
    .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.2);
        animation: rise 10s linear infinite;
    }

    @keyframes rise {
        0% {
            transform: translateY(100vh) scale(0.5);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-10vh) scale(1);
            opacity: 0;
        }
    }

    /* Music Button */
    #playBtn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 10px 15px;
        border-radius: 30px;
        border: none;
        background: #ff00ff;
        color: white;
        cursor: pointer;
        display: none;
        z-index: 20;
    }
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="playBtn">▶ Play Music</button>

<!-- Floating circles -->
<script>
for (let i = 0; i < 20; i++) {
    let c = document.createElement("div");
    c.classList.add("circle");
    c.style.width = c.style.height = Math.random() * 40 + "px";
    c.style.left = Math.random() * 100 + "vw";
    c.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(c);
}
</script>

<!-- Main Card -->
<div class="card">
    <h1>🎂 Happy Birthday Carona 🎉</h1>
    <p>Wishing you joy, success and lots of happiness!</p>
    <button onclick="alert('Have an amazing day! 💖')">
        Celebrate 🎊
    </button>
</div>

<!-- 🎵 Autoplay Script -->
<script>
const music = document.getElementById("bg-music");
const btn = document.getElementById("playBtn");

// Try autoplay
window.addEventListener("load", () => {
    let playPromise = music.play();

    if (playPromise !== undefined) {
        playPromise
            .then(() => {
                console.log("Autoplay worked");
            })
            .catch(() => {
                btn.style.display = "block";
            });
    }
});

// Button click fallback
btn.addEventListener("click", () => {
    music.play();
    btn.style.display = "none";
});
</script>

</body>
</html>
